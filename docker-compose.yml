# BloodConnect Docker Compose Configuration

version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bloodconnect-backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
    networks:
      - bloodconnect-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # Frontend (optional, for production)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: bloodconnect-frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - bloodconnect-network

networks:
  bloodconnect-network:
    driver: bridge
